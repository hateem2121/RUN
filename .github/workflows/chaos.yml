name: Chaos Engineering Pipeline

on:
  schedule:
    - cron: '0 3 * * 0' # Weekly on Sundays at 3am UTC
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'Target environment for chaos tests'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - local

concurrency:
  group: chaos-${{ github.ref }}
  cancel-in-progress: true

env:
  STAGING_URL: ${{ vars.STAGING_URL || 'http://localhost:5001' }}

jobs:
  chaos-test:
    name: Resilience Verification
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_environment || 'staging' }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Verify Target Environment
        run: |
          echo "Target: $STAGING_URL"
          curl -sf "$STAGING_URL/api/health" || echo "Warning: Target may not be reachable"
          
      - name: Run Chaos Test Scenarios
        run: npx vitest run tests/chaos/chaos-scenarios.test.ts --reporter=verbose
        env:
          STAGING_URL: ${{ env.STAGING_URL }}
          NODE_ENV: test
        continue-on-error: true
        
      - name: Wait for System Stabilization
        run: sleep 30
        
      - name: Verify Recovery
        run: npx tsx tests/chaos/recovery-verification.ts
        env:
          STAGING_URL: ${{ env.STAGING_URL }}
        timeout-minutes: 5
        
      - name: Upload Chaos Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chaos-test-results
          path: |
            test-results/
            coverage/
          retention-days: 7

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: chaos-test
    if: failure()
    steps:
      - name: Send Slack Notification
        if: ${{ vars.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"⚠️ Chaos Engineering tests failed! Check GitHub Actions for details."}' \
            ${{ vars.SLACK_WEBHOOK_URL }}
