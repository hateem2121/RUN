name: Docs Lint

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.markdownlint.json'
  push:
    branches: [main]
    paths:
      - '**/*.md'

jobs:
  markdownlint:
    name: Markdown Lint
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            !node_modules/**
            !.gemini/**
            !.agent/**
            !.claude/**
            !docs/audit/**
            !findings.md
            !task_plan.md
          config: '.markdownlint.json'

