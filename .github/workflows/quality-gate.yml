name: Quality Gate (Cloud)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality-check:
    name: 🛡️ April 2026 Quality Gate
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: run_remix
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📋 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: 🔧 Install Dependencies
        run: npm ci

      - name: 🎨 CSS Architecture Lint
        run: npm run lint:css-contract

      - name: 🏗️ Build Project
        run: npm run build

      - name: 🔒 NPM Audit (Dependency Security)
        run: npm audit --audit-level=high || true
        continue-on-error: true

      - name: 🛡️ Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: 📊 Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      - name: 🚀 React Scan (Production Safety Check)
        run: |
          if grep -q "ReactScan({" vite.config.ts; then
            echo "✅ React Scan plugin found."
            if grep -q "enable: mode === \"development\"" vite.config.ts; then
              echo "✅ React Scan is safely restricted to development mode."
            else
              echo "❌ CRITICAL: React Scan might be enabled in production!"
              exit 1
            fi
          fi

      - name: ⚡ Lighthouse CI (Performance)
        run: |
          npm install -g @lhci/cli@0.13.x
          lhci autorun || true
