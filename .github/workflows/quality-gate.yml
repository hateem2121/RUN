name: Quality Gate (Cloud)


on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


jobs:
  quality-check:
    name: 🛡️ April 2026 Quality Gate
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read


    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: run_remix
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5


    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
