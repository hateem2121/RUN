# Visual Regression & Guardrails CI
#
# Runs on PRs to main/develop branches.
# - Validates Tailwind v4 CSS import order
# - Validates SSR CSS injection (informational)
# - Runs full visual regression suite (168 configurations)
# - Uploads artifacts on failure for debugging

name: Visual Regression

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      strict_preload:
        description: "Run SSR preload check in strict mode"
        type: boolean
        default: false

permissions:
  contents: read

env:
  NODE_VERSION: "24"

jobs:
  guardrails:
    name: Tailwind v4 Guardrails
    runs-on: [self-hosted, macOS]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      #- name: CSS Import Order Lint
      #  run: npx tsx scripts/lint-css-import-order.ts

      #- name: SSR Preload Check (Informational)
      #  run: npx tsx scripts/check-ssr-preload.ts
      #  env:
      #    SSR_PRELOAD_STRICT: ${{ github.event.inputs.strict_preload == 'true' && '1' || '' }}
      #  continue-on-error: true

  visual-regression:
    name: Visual Regression Tests
    runs-on: [self-hosted, macOS]
    timeout-minutes: 30
    needs: guardrails

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build application
        run: npm run build

      - name: Start server
        run: |
          npm run start &
          sleep 10
        env:
          NODE_ENV: production
          PORT: 5002
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          SESSION_SECRET: placeholder_session_secret_min_32_chars_long
          JWT_SECRET: placeholder_jwt_secret_min_32_chars_long
          ENCRYPTION_KEY: placeholder_encryption_key_min_32_chars_long
          INITIAL_ADMIN_EMAIL: admin@example.com

      - name: Run Visual Regression Tests
        run: npx playwright test e2e/visual-regression-audit.spec.ts
        env:
          BASE_URL: http://localhost:5002

      - name: Upload Playwright Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Test Results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      - name: Upload Screenshots
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: failure()
        with:
          name: screenshots-diff
          path: |
            e2e/**/*.png
            test-results/**/*.png
          retention-days: 30
