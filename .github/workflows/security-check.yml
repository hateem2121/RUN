name: Security Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security-config-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Check for ENABLE_MOCK_ADMIN in production configs
        run: |
          # Check .env.production if it exists and is committed (unlikely but possible)
          if [ -f .env.production ]; then
            if grep -q "ENABLE_MOCK_ADMIN=true" .env.production; then
              echo "❌ ERROR: ENABLE_MOCK_ADMIN=true found in .env.production"
              exit 1
            fi
          fi
          
          # Check deployment configs or other potential locations
          # (Adjust paths specific to your deployment setup, e.g., options in code)
          if grep -r "ENABLE_MOCK_ADMIN.*true" server/config/* 2>/dev/null; then
             # Filter out the validation logic itself which might contain the string strictly for checking
             # This is a basic grep, might need refinement if validation code triggers it.
             # We rely on the env-validation.ts changes to handle runtime checking.
             echo "ℹ️  Found references to ENABLE_MOCK_ADMIN=true in code. Manual review recommended if not in validation logic."
          fi

      - name: Check for committed secrets (basic)
        run: |
          # Basic scan for potentially committed secrets in .env files
          if grep -r "SESSION_SECRET=" . 2>/dev/null | grep -v ".env.example" | grep -v "node_modules"; then
             echo "⚠️  WARNING: Potential real SESSION_SECRET found in files. Ensure secrets are not committed."
          fi

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
        
      - name: Run npm audit
        # Fail only on critical for now to avoid blocking build on low/mod issues
        run: npm audit --audit-level=critical
