name: Production Deployment

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  backup:
    name: Create Safety Backup
    runs-on: [self-hosted, macOS]
    steps:
      - name: Create Backup Branch
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          # Create a branch from main endpoint to serve as an instant backup
          branch_name: backup/deploy-${{ github.run_id }}
          api_key: ${{ secrets.NEON_API_KEY }}

  deploy_db:
    name: Apply Database Migrations
    needs: backup
    runs-on: [self-hosted, macOS]
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Migrations
        run: npm run migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          INITIAL_ADMIN_EMAIL: ${{ secrets.INITIAL_ADMIN_EMAIL }}
          CLOUD_TASKS_AUDIENCE: "placeholder"
          CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL: "placeholder@example.com"
