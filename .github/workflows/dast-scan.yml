# DAST Security Scanning with OWASP ZAP
# Runs dynamic application security testing against staging environment

name: DAST Security Scan

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to scan'
        required: false
        default: 'https://staging.runapparel.com'

jobs:
  zap-scan:
    name: OWASP ZAP Full Scan
    runs-on: [self-hosted, macOS]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set target URL
        id: target
        run: |
          if [ -n "${{ github.event.inputs.target_url }}" ]; then
            echo "url=${{ github.event.inputs.target_url }}" >> $GITHUB_OUTPUT
          else
            echo "url=https://staging.runapparel.com" >> $GITHUB_OUTPUT
          fi
      
      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: ${{ steps.target.outputs.url }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j'
          allow_issue_writing: false
      
      - name: Upload ZAP HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report-html
          path: report_html.html
          retention-days: 30
      
      - name: Upload ZAP JSON Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report-json
          path: report_json.json
          retention-days: 30
      
      - name: Check for High Severity Issues
        if: always()
        run: |
          if [ -f report_json.json ]; then
            HIGH_COUNT=$(jq '[.site[].alerts[] | select(.riskcode >= 3)] | length' report_json.json 2>/dev/null || echo "0")
            echo "High/Critical severity issues found: $HIGH_COUNT"
            if [ "$HIGH_COUNT" -gt "0" ]; then
              echo "::warning::Found $HIGH_COUNT high/critical severity security issues"
            fi
          fi
      
      - name: Notify on Critical Issues
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚨 DAST Scan found critical security issues",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*DAST Security Scan Failed*\nTarget: ${{ steps.target.outputs.url }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SECURITY_SLACK_WEBHOOK }}
