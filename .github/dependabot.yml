version: 2
updates:
  # NPM dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "automated"
    groups:
      # Group production dependencies
      production:
        patterns:
          - "express*"
          - "react*"
          - "@react-router/*"
          - "drizzle-orm"
          - "@upstash/*"
          - "@sentry/*"
        update-types:
          - "minor"
          - "patch"
      # Group dev/build tools
      dev-tools:
        patterns:
          - "@types/*"
          - "typescript"
          - "vite*"
          - "vitest"
          - "biome"
          - "@biomejs/*"
        update-types:
          - "minor"
          - "patch"
      # Group testing libraries
      testing:
        patterns:
          - "playwright*"
          - "@playwright/*"
          - "msw"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Ignore major version updates (review manually)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
    labels:
      - "ci"
      - "automated"

  # Docker base images (Security: Check for CVE patches)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "docker"
    labels:
      - "dependencies"
      - "docker"
      - "security"

