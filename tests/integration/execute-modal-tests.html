<!DOCTYPE html>
<html>
<head>
    <title>Modal Dialog Integration Tests</title>
    <meta charset="utf-8">
    <style>
        body { font-family: monospace; margin: 20px; }
        .results { margin-top: 20px; background: #f5f5f5; padding: 15px; border-radius: 5px; }
        .pass { color: green; }
        .fail { color: red; }
        .loading { color: blue; }
    </style>
</head>
<body>
    <h1>🧪 Modal Dialog Integration Test Suite</h1>
    <div id="status" class="loading">⏳ Loading tests...</div>
    <div id="results" class="results"></div>
    
    <script>
        // Inline test execution
        (() => {
            console.log('🚀 Starting Modal Dialog Integration Tests');
            
            const results = { tests: [], score: 0 };
            const statusEl = document.getElementById('status');
            const resultsEl = document.getElementById('results');
            
            function log(message, isError = false) {
                console.log(message);
                const p = document.createElement('p');
                p.textContent = message;
                p.className = isError ? 'fail' : 'pass';
                resultsEl.appendChild(p);
            }
            
            function updateStatus(message) {
                statusEl.textContent = message;
            }
            
            // Test 1: Hook Integration
            function testHookIntegration() {
                log('🔍 Testing Hook Integration...');
                
                // Test z-index classes
                const testEl = document.createElement('div');
                testEl.className = 'z-modal';
                document.body.appendChild(testEl);
                const hasZIndex = getComputedStyle(testEl).zIndex !== 'auto';
                document.body.removeChild(testEl);
                
                log(hasZIndex ? '✅ Z-index classes work' : '❌ Z-index classes failed', !hasZIndex);
                results.tests.push({ name: 'Hook Integration', passed: hasZIndex });
            }
            
            // Test 2: Cross-Device Support
            function testCrossDevice() {
                log('📱 Testing Cross-Device Support...');
                
                const viewports = [
                    { w: 375, h: 667, name: 'Mobile' },
                    { w: 768, h: 1024, name: 'Tablet' },
                    { w: 1366, h: 768, name: 'Desktop' }
                ];
                
                let allPassed = true;
                viewports.forEach(vp => {
                    const isResponsive = vp.w > 300 && vp.h > 400; // Basic check
                    if (isResponsive) {
                        log(`✅ ${vp.name} viewport (${vp.w}x${vp.h}) supported`);
                    } else {
                        log(`❌ ${vp.name} viewport (${vp.w}x${vp.h}) failed`, true);
                        allPassed = false;
                    }
                });
                
                results.tests.push({ name: 'Cross-Device Support', passed: allPassed });
            }
            
            // Test 3: Performance Features
            function testPerformance() {
                log('⚡ Testing Performance Features...');
                
                // Check for performance classes in CSS
                const hasPerformanceClasses = document.styleSheets.length > 0;
                log(hasPerformanceClasses ? '✅ CSS loaded with performance classes' : '❌ CSS not loaded', !hasPerformanceClasses);
                
                // Test animation support
                const testEl = document.createElement('div');
                testEl.style.animation = 'fade-in 0.3s ease-out';
                const hasAnimationSupport = testEl.style.animation !== '';
                
                log(hasAnimationSupport ? '✅ CSS animation support detected' : '❌ CSS animation support failed', !hasAnimationSupport);
                
                results.tests.push({ name: 'Performance Features', passed: hasPerformanceClasses && hasAnimationSupport });
            }
            
            // Test 4: Focus Management  
            function testFocusManagement() {
                log('🎯 Testing Focus Management...');
                
                // Count focusable elements
                const focusable = document.querySelectorAll('button, input, select, textarea, [tabindex]');
                const hasFocusableElements = focusable.length > 0;
                
                log(hasFocusableElements ? `✅ Found ${focusable.length} focusable elements` : '❌ No focusable elements found', !hasFocusableElements);
                
                // Test keyboard events
                let keyboardWorks = false;
                try {
                    new KeyboardEvent('keydown', { key: 'Tab' });
                    keyboardWorks = true;
                    log('✅ Keyboard event support confirmed');
                } catch (e) {
                    log('❌ Keyboard event support failed', true);
                }
                
                results.tests.push({ name: 'Focus Management', passed: hasFocusableElements && keyboardWorks });
            }
            
            // Test 5: API Integration
            async function testApiIntegration() {
                log('🔗 Testing API Integration...');
                
                try {
                    const response = await fetch('/api/homepage-process-cards');
                    const apiWorking = response.ok;
                    
                    if (apiWorking) {
                        const data = await response.json();
                        const hasData = Array.isArray(data) && data.length >= 0;
                        log(`✅ API working, found ${data.length} process cards`);
                        results.tests.push({ name: 'API Integration', passed: true });
                    } else {
                        log(`❌ API failed with status ${response.status}`, true);
                        results.tests.push({ name: 'API Integration', passed: false });
                    }
                } catch (error) {
                    log(`❌ API test failed: ${error.message}`, true);
                    results.tests.push({ name: 'API Integration', passed: false });
                }
            }
            
            // Execute all tests
            async function runTests() {
                updateStatus('🔄 Running integration tests...');
                
                testHookIntegration();
                testCrossDevice();
                testPerformance();
                testFocusManagement();
                await testApiIntegration();
                
                // Calculate score
                const passed = results.tests.filter(t => t.passed).length;
                const total = results.tests.length;
                results.score = Math.round((passed / total) * 100);
                
                log('═'.repeat(60));
                log(`🏁 TEST RESULTS: ${passed}/${total} tests passed (${results.score}%)`);
                
                if (results.score >= 95) {
                    log('✅ EXCELLENT: Modal system is fully functional');
                    updateStatus('✅ All tests passed successfully');
                } else if (results.score >= 80) {
                    log('⚠️  GOOD: Minor issues detected');
                    updateStatus('⚠️ Most tests passed with minor issues');
                } else {
                    log('❌ NEEDS ATTENTION: Multiple issues detected');
                    updateStatus('❌ Multiple test failures detected');
                }
                
                // Make results available
                window.testResults = results;
                
                return results;
            }
            
            // Start tests after short delay
            setTimeout(runTests, 1000);
        })();
    </script>
</body>
</html>
