# ArgoCD Application for RUN-Remix
# This file defines the ArgoCD Application that manages the deployment

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: run-remix
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    repoURL: https://github.com/your-org/RUN-Remix.git
    targetRevision: HEAD
    path: k8s/argocd/overlays/production
  
  destination:
    server: https://kubernetes.default.svc
    namespace: run-remix
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  # Health checks
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
