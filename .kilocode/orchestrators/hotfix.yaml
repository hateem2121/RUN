name: hotfix
description: Emergency hotfix workflow for critical production issues
trigger: When critical bugs need immediate production fixes
agents:
  - orchestrator
  - developer
  - tester
  - reviewer
priority: critical
steps:
  - step: 1
    agent: orchestrator
    action: triage
    description: Triage and assess hotfix severity
    inputs:
      - Issue description
      - Impact assessment
      - Affected systems
    outputs:
      - hotfix_report.md
    questions:
      - What is the business impact?
      - How many users are affected?
      - Is there a workaround?
      - What is the root cause hypothesis?
    blast_phase: blueprint

  - step: 2
    agent: developer
    action: create_branch
    description: Create hotfix branch from production
    commands:
      - git checkout production
      - git pull origin production
      - git checkout -b hotfix/issue-description
    blast_phase: blueprint

  - step: 3
    agent: developer
    action: investigate
    description: Rapid investigation of root cause
    skill: systematic-debugging
    timebox: 30 minutes
    outputs:
      - root_cause.md
    blast_phase: blueprint

  - step: 4
    agent: developer
    action: implement_fix
    description: Implement minimal fix
    principles:
      - Fix only the critical issue
      - No refactoring or improvements
      - Minimal code changes
      - Preserve backward compatibility
    blast_phase: architect

  - step: 5
    agent: tester
    action: verify_fix
    description: Verify fix resolves the issue
    skill: verification-before-completion
    commands:
      - npm run test
      - npm run build
    gates:
      - Fix verified locally
      - No regressions in existing tests
      - Build succeeds
    blast_phase: architect

  - step: 6
    agent: reviewer
    action: rapid_review
    description: Rapid code review for hotfix
    skill: code-review
    timebox: 15 minutes
    checklist:
      - Fix addresses root cause
      - No new security vulnerabilities
      - No breaking changes
      - Minimal scope
    blast_phase: architect

  - step: 7
    agent: developer
    action: update_changelog
    description: Update CHANGELOG with hotfix entry
    outputs:
      - CHANGELOG.md
    format: |
      ## [X.X.X] - YYYY-MM-DD
      ### Fixed
      - Critical: [Description of fix]
    blast_phase: stylize

  - step: 8
    agent: orchestrator
    action: deploy_staging
    description: Deploy to staging for final verification
    commands:
      - npm run deploy:staging
    verification:
      - Smoke tests pass
      - Fix verified in staging
    blast_phase: trigger

  - step: 9
    agent: orchestrator
    action: deploy_production
    description: Deploy hotfix to production
    commands:
      - npm run deploy:production
    verification:
      - Health checks pass
      - Error rates normal
      - Fix verified in production
    blast_phase: trigger

  - step: 10
    agent: orchestrator
    action: post_hotfix
    description: Post-hotfix activities
    outputs:
      - Incident report
      - Team notification
      - Monitoring alert update
    blast_phase: trigger
severity_levels:
  p0_critical:
    description: Complete service outage or data loss
    response_time: immediate
    skip_staging: true
    notify: all_stakeholders
  p1_high:
    description: Major feature broken for many users
    response_time: 1_hour
    skip_staging: false
    notify: engineering_team
  p2_medium:
    description: Feature degraded but workaround exists
    response_time: 4_hours
    skip_staging: false
    notify: team_lead
rollback:
  enabled: true
  automatic: true
  triggers:
    - Error rate exceeds threshold
    - Health check failure
    - Critical new bug introduced
  steps:
    - Revert to previous production tag
    - Redeploy
    - Notify stakeholders
    - Create incident report
communication:
  templates:
    initial: |
      🚨 HOTFIX IN PROGRESS
      
      Issue: [Description]
      Severity: P[X]
      Impact: [Business impact]
      ETA: [Estimated time]
      
      Status updates will be posted every 30 minutes.
    
    resolved: |
      ✅ HOTFIX DEPLOYED
      
      Issue: [Description]
      Resolution: [What was fixed]
      Deployed: [Timestamp]
      
      Post-incident review scheduled for [Date].
checklist:
  pre_deploy:
    - Root cause identified
    - Fix implemented and tested
    - Code reviewed
    - Changelog updated
    - Staging verified - unless P0
  post_deploy:
    - Production verified
    - Monitoring green
    - Stakeholders notified
    - Incident report created
    - Post-incident review scheduled
error_handling:
  fix_fails:
    action: escalate
    notify: engineering_lead
  staging_fails:
    action: investigate
    timebox: 15 minutes
  production_fails:
    action: rollback
    notify: all_stakeholders
metadata:
  version: 1.0.0
  created: 2026-02-15
  author: AntiGravity Framework
