name: feature-development
description: Complete feature development workflow from planning to deployment
trigger: When implementing a new feature requiring multiple files and agents
agents:
  - orchestrator
  - architect
  - developer
  - tester
  - reviewer
  - documenter
steps:
  - step: 1
    agent: orchestrator
    action: initialize
    description: Initialize workflow and create task tracking
    outputs:
      - task_plan.md
      - findings.md
    blast_phase: blueprint

  - step: 2
    agent: architect
    action: plan
    description: Create implementation plan with architecture decisions
    skill: writing-plans
    outputs:
      - implementation_plan.md
    blast_phase: blueprint
    gates:
      - User approval required for complex tasks over 100 lines

  - step: 3
    agent: developer
    action: implement
    description: Implement feature following TDD methodology
    skill: test-driven-development
    substeps:
      - Write failing tests first
      - Implement minimum code to pass
      - Refactor for quality
    outputs:
      - source_files
      - test_files
    blast_phase: architect

  - step: 4
    agent: tester
    action: verify
    description: Run tests and verify coverage
    skill: verification-before-completion
    commands:
      - npm run test
      - npm run test:coverage
    gates:
      - Coverage must meet 80% target for services
      - All tests must pass
    blast_phase: architect

  - step: 5
    agent: reviewer
    action: review
    description: Code review for quality and compliance
    skill: code-review
    checklist:
      - No any types in TypeScript
      - No forwardRef in React 19
      - No React Three Fiber imports
      - No arbitrary Tailwind values
      - Business logic in services
      - Accessibility features present
    blast_phase: architect

  - step: 6
    agent: developer
    action: refactor
    description: Address review feedback
    skill: refactoring
    condition: If review finds issues
    blast_phase: architect

  - step: 7
    agent: documenter
    action: document
    description: Update documentation
    outputs:
      - JSDoc comments
      - README updates
      - API documentation
    blast_phase: stylize

  - step: 8
    agent: orchestrator
    action: verify
    description: Final verification before completion
    commands:
      - npm run build
      - npm run typecheck
      - npm run check:apply
    blast_phase: trigger

  - step: 9
    agent: orchestrator
    action: complete
    description: Mark workflow complete and update progress
    outputs:
      - progress.md
    blast_phase: trigger
error_handling:
  test_failure:
    action: retry
    max_retries: 3
    agent: developer
  review_rejection:
    action: refactor
    agent: developer
  build_failure:
    action: fix
    agent: developer
  type_error:
    action: fix
    agent: developer
rollback:
  enabled: true
  strategy: git_revert
  checkpoint: after_step_2
metadata:
  version: 1.0.0
  created: 2026-02-15
  author: AntiGravity Framework
