name: release
description: Production release workflow from staging to deployment
trigger: When releasing new features or updates to production
agents:
  - orchestrator
  - tester
  - reviewer
  - documenter
steps:
  - step: 1
    agent: orchestrator
    action: prepare
    description: Prepare release branch and gather changes
    inputs:
      - version bump type - major minor patch
      - release notes draft
    outputs:
      - release_branch.md
      - changelog_draft.md
    blast_phase: blueprint

  - step: 2
    agent: tester
    action: validate_tests
    description: Run full test suite
    skill: verification-before-completion
    commands:
      - npm run test
      - npm run test:coverage
      - npm run test:e2e
    gates:
      - All unit tests pass
      - Coverage meets 80% threshold
      - All E2E tests pass
      - No skipped tests
    blast_phase: blueprint

  - step: 3
    agent: reviewer
    action: code_freeze
    description: Review all changes since last release
    skill: code-review
    checklist:
      - No breaking changes without migration path
      - All TODOs resolved or documented
      - No console.log statements in production code
      - Environment variables documented
    blast_phase: architect

  - step: 4
    agent: documenter
    action: update_changelog
    description: Update CHANGELOG.md with release notes
    skill: changelog-generator
    inputs:
      - git commits since last release
      - version number
    outputs:
      - CHANGELOG.md
    sections:
      - Added - New features
      - Changed - Changes to existing features
      - Fixed - Bug fixes
      - Breaking - Breaking changes
    blast_phase: stylize

  - step: 5
    agent: documenter
    action: update_docs
    description: Update documentation for release
    outputs:
      - README.md updates
      - API documentation updates
      - Migration guide if breaking changes
    blast_phase: stylize

  - step: 6
    agent: tester
    action: build_verification
    description: Verify production build
    commands:
      - npm run build
      - npm run typecheck
      - npm run check:apply
    gates:
      - Build completes without errors
      - No TypeScript errors
      - No linting errors
      - Bundle size within limits
    blast_phase: architect

  - step: 7
    agent: orchestrator
    action: version_bump
    description: Bump version numbers
    files_to_update:
      - package.json
      - package-lock.json
      - docs/overview.md
    blast_phase: trigger

  - step: 8
    agent: orchestrator
    action: create_tag
    description: Create git tag for release
    commands:
      - git tag -a vX.X.X -m Release vX.X.X
      - git push origin vX.X.X
    blast_phase: trigger

  - step: 9
    agent: orchestrator
    action: deploy
    description: Deploy to production
    commands:
      - npm run deploy:production
    verification:
      - Health check passes
      - Smoke tests pass
      - Monitoring alerts green
    blast_phase: trigger

  - step: 10
    agent: orchestrator
    action: post_release
    description: Post-release activities
    outputs:
      - Release announcement
      - GitHub release notes
      - Team notification
    blast_phase: trigger
version_types:
  major:
    description: Breaking changes
    example: 1.0.0 to 2.0.0
    requires: Migration guide
  minor:
    description: New features backward compatible
    example: 1.0.0 to 1.1.0
    requires: Feature documentation
  patch:
    description: Bug fixes backward compatible
    example: 1.0.0 to 1.0.1
    requires: Changelog entry
rollback:
  enabled: true
  strategy: git_revert_tag
  steps:
    - Identify last stable tag
    - Revert to previous version
    - Redeploy
    - Notify stakeholders
  automatic_triggers:
    - Health check failure
    - Error rate spike
    - Critical bug reports
checklist:
  pre_release:
    - All tests passing
    - Code review complete
    - Documentation updated
    - Changelog updated
    - Version bumped
    - Tag created
  post_release:
    - Health checks passing
    - Smoke tests passing
    - Monitoring green
    - Team notified
    - Release notes published
error_handling:
  test_failure:
    action: abort
    notify: true
  build_failure:
    action: abort
    notify: true
  deploy_failure:
    action: rollback
    notify: true
  health_check_failure:
    action: rollback
    notify: true
metadata:
  version: 1.0.0
  created: 2026-02-15
  author: AntiGravity Framework
