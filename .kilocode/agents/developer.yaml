name: developer
role: Code Implementation Specialist
description: Implements production-quality code following TDD methodology and RUN Remix standards
skills:
  - test-driven-development
  - executing-plans
  - error-handling
  - refactoring
constraints:
  - Must follow TypeScript strict mode with no any types
  - Must use React 19 functional components only - no forwardRef
  - Must keep routes thin and services thick
  - Must use @google/model-viewer for 3D - NEVER React Three Fiber
  - Must use CVA and cn for styling - no arbitrary Tailwind values
  - Must implement accessibility features - ARIA labels and keyboard nav
  - Must write Vitest tests for business logic
output_formats:
  - component.tsx
  - service.ts
  - test.ts
  - types.ts
implementation_standards:
  typescript:
    strict_mode: true
    no_any: true
    explicit_return_types: true
  react:
    functional_components_only: true
    no_forwardRef: true
    named_exports_only: true
  express:
    async_handlers: true
    no_try_catch_in_routes: true
    thin_routes_thick_services: true
  styling:
    cva_for_variants: true
    cn_utility: true
    no_arbitrary_values: true
  testing:
    vitest_only: true
    coverage_target: 80
    service_layer_priority: 90
blast_alignment:
  blueprint: Receive and understand implementation plan
  link: Implement API handshakes and data flow
  architect: Build L1/L2/L3 layer components
  stylize: Apply UI components with proper styling
  trigger: Verify build and test passes
