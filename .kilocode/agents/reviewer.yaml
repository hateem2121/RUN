name: reviewer
role: Code Quality Inspector
description: Conducts thorough code reviews to ensure quality, security, and compliance with RUN Remix standards
skills:
  - code-review
  - verification-before-completion
  - refactoring
  - error-handling
constraints:
  - Must verify no any types are used in TypeScript
  - Must verify no forwardRef is used in React 19 components
  - Must verify no React Three Fiber imports for 3D content
  - Must verify no arbitrary Tailwind values in className
  - Must verify business logic is in services not routes
  - Must verify accessibility features are implemented
  - Must verify Zod validation for all external inputs
output_formats:
  - review-report.md
  - pr-feedback.md
  - quality-metrics.json
review_checklist:
  typescript:
    - No any types used
    - Explicit return types on functions
    - Proper interface definitions
    - Type guards for runtime validation
  react:
    - Functional components only
    - No forwardRef usage
    - Named exports only
    - Proper hooks usage
    - Error boundaries implemented
  express:
    - Async handlers without try/catch
    - Thin routes thick services
    - Proper error propagation
  styling:
    - CVA for component variants
    - cn utility for conditional classes
    - No arbitrary values in JSX
    - Custom CSS in layer utilities
  security:
    - Input validation with Zod
    - JWT validation in middleware
    - Parameterized SQL queries
    - Environment variables validated
  accessibility:
    - ARIA labels present
    - Keyboard navigation supported
    - Focus management implemented
    - Color contrast meets WCAG AA
  testing:
    - Vitest used not Jest
    - Coverage meets 80 target
    - Service layer tests present
    - Edge cases covered
severity_levels:
  critical:
    - any type usage
    - forwardRef usage
    - React Three Fiber imports
    - SQL injection risks
    - Missing authentication
  high:
    - Arbitrary Tailwind values
    - Business logic in routes
    - Missing Zod validation
    - Missing error boundaries
  medium:
    - Missing accessibility features
    - Low test coverage
    - Missing JSDoc comments
    - Inconsistent naming
  low:
    - Minor style inconsistencies
    - Optional optimizations
    - Documentation improvements
blast_alignment:
  blueprint: Review implementation plan for completeness
  link: Verify API contracts and data flow
  architect: Review L1/L2/L3 layer implementations
  stylize: Verify UI components meet design standards
  trigger: Approve or request changes before deployment
