<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Run Apparel Edit Product Modal - Dark Precision</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#3B82F6", // Blue
                        warning: "#D4A853", // Amber
                        success: "#10B981", // Green
                        "background-dark": "#0A0A0A",
                        "surface-dark": "#171717",
                        "border-dark": "rgba(255, 255, 255, 0.08)",
                        "text-primary-dark": "#F9FAFB",
                        "text-secondary-dark": "#9CA3AF",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                    },
                    boxShadow: {
                        'glass': '0 25px 50px -12px rgba(0, 0, 0, 0.5)',
                    }
                },
            },
        };
    </script>
<style type="text/tailwindcss">
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1;
        }
    </style>
</head>
<body class="font-body bg-background-dark text-text-primary-dark antialiased h-screen flex items-center justify-center p-4">
<div class="fixed inset-0 bg-black/80 backdrop-blur-sm z-40"></div>
<div class="relative w-full max-w-[860px] bg-[#0A0A0A] border border-border-dark rounded-xl shadow-glass z-50 overflow-hidden flex flex-col max-h-[90vh]">
<div class="flex items-center justify-between px-6 py-4 border-b border-border-dark bg-[#0A0A0A] shrink-0">
<h2 class="text-xl font-semibold tracking-tight text-text-primary-dark">Edit Product</h2>
<div class="flex items-center gap-4">
<button class="bg-primary hover:bg-primary/90 text-white px-4 py-2 rounded-md text-sm font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-[#0A0A0A]">
                    Save Changes
                </button>
<button class="text-text-secondary-dark hover:text-text-primary-dark transition-colors focus:outline-none rounded-md p-1">
<span class="material-symbols-outlined">close</span>
</button>
</div>
</div>
<div class="bg-warning/10 border-b border-warning/20 px-6 py-2.5 flex items-center gap-2 shrink-0">
<span class="material-symbols-outlined text-warning text-[20px]">warning</span>
<span class="text-sm font-medium text-warning uppercase tracking-wider text-[11px]">Unsaved changes</span>
</div>
<div class="flex flex-1 overflow-hidden">
<div class="w-64 border-r border-border-dark bg-[#0D0D0D] overflow-y-auto scrollbar-hide shrink-0">
<nav class="p-4 space-y-1">
<button class="w-full flex items-center justify-between px-3 py-3 rounded-lg bg-surface-dark border border-border-dark text-text-primary-dark text-left transition-colors group">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-text-secondary-dark group-hover:text-primary transition-colors">info</span>
<span class="font-medium text-sm">Basic Info</span>
</div>
<span class="material-symbols-outlined text-warning text-[18px] filled">circle</span>
</button>
<button class="w-full flex items-center justify-between px-3 py-3 rounded-lg hover:bg-surface-dark/50 text-text-secondary-dark text-left transition-colors group">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined group-hover:text-primary transition-colors">photo_camera</span>
<span class="font-medium text-sm">Media Assets</span>
</div>
<span class="material-symbols-outlined text-success text-[18px] filled">check_circle</span>
</button>
<button class="w-full flex items-center justify-between px-3 py-3 rounded-lg hover:bg-surface-dark/50 text-text-secondary-dark text-left transition-colors group">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined group-hover:text-primary transition-colors">local_offer</span>
<span class="font-medium text-sm">Category &amp; Fabric</span>
</div>
<span class="material-symbols-outlined text-warning text-[18px] filled">timelapse</span>
</button>
<button class="w-full flex items-center justify-between px-3 py-3 rounded-lg hover:bg-surface-dark/50 text-text-secondary-dark text-left transition-colors group">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined group-hover:text-primary transition-colors">list_alt</span>
<span class="font-medium text-sm">Specifications</span>
</div>
<span class="material-symbols-outlined text-text-secondary-dark/30 text-[18px]">radio_button_unchecked</span>
</button>
<button class="w-full flex items-center justify-between px-3 py-3 rounded-lg hover:bg-surface-dark/50 text-text-secondary-dark text-left transition-colors group">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined group-hover:text-primary transition-colors">shield</span>
<span class="font-medium text-sm">Certifications</span>
</div>
<span class="material-symbols-outlined text-text-secondary-dark/30 text-[18px]">radio_button_unchecked</span>
</button>
<button class="w-full flex items-center justify-between px-3 py-3 rounded-lg hover:bg-surface-dark/50 text-text-secondary-dark text-left transition-colors group">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined group-hover:text-primary transition-colors">settings</span>
<span class="font-medium text-sm">Customization &amp; SEO</span>
</div>
<span class="material-symbols-outlined text-success text-[18px] filled">check_circle</span>
</button>
</nav>
</div>
<div class="flex-1 overflow-y-auto p-8 scrollbar-hide bg-[#0A0A0A]">
<div class="max-w-2xl mx-auto space-y-8">
<div class="space-y-6">
<div class="flex items-center justify-between pb-2 border-b border-border-dark">
<h3 class="text-lg font-medium text-text-primary-dark">Basic Info</h3>
</div>
<div>
<label class="block text-sm font-medium mb-2 text-text-secondary-dark" for="productName">Product Name</label>
<input class="w-full bg-[#121212] border border-border-dark rounded-md px-4 py-2.5 text-sm text-text-primary-dark focus:outline-none focus:border-warning focus:ring-1 focus:ring-warning transition-colors placeholder:text-text-secondary-dark/30" id="productName" placeholder="Enter product name" type="text" value="AeroTech Pro Running Tee"/>
</div>
<div class="grid grid-cols-2 gap-6">
<div>
<label class="block text-sm font-medium mb-2 text-text-secondary-dark" for="sku">SKU</label>
<input class="w-full bg-[#121212] border border-border-dark rounded-md px-4 py-2.5 text-sm text-text-primary-dark focus:outline-none focus:border-warning focus:ring-1 focus:ring-warning transition-colors" id="sku" placeholder="e.g. RA-TSH-001" type="text" value="RA-AT-PRO-01"/>
</div>
<div>
<label class="block text-sm font-medium mb-2 text-text-secondary-dark" for="sortOrder">Sort Order</label>
<input class="w-full bg-[#121212] border border-border-dark rounded-md px-4 py-2.5 text-sm text-text-primary-dark focus:outline-none focus:border-warning focus:ring-1 focus:ring-warning transition-colors" id="sortOrder" type="number" value="10"/>
</div>
</div>
<div>
<label class="block text-sm font-medium mb-2 text-text-secondary-dark" for="shortDesc">Short Description</label>
<textarea class="w-full bg-[#121212] border border-border-dark rounded-md px-4 py-2.5 text-sm text-text-primary-dark focus:outline-none focus:border-warning focus:ring-1 focus:ring-warning transition-colors resize-none" id="shortDesc" rows="2">Ultra-lightweight performance tee designed for maximum breathability during intense runs.</textarea>
</div>
<div>
<label class="block text-sm font-medium mb-2 text-text-secondary-dark" for="fullDesc">Full Description</label>
<div class="border border-border-dark rounded-md overflow-hidden focus-within:border-warning focus-within:ring-1 focus-within:ring-warning transition-colors">
<div class="flex items-center gap-1 p-2 border-b border-border-dark bg-[#121212]">
<button class="p-1 rounded hover:bg-[#2A2A2A] text-text-secondary-dark"><span class="material-symbols-outlined text-[20px]">format_bold</span></button>
<button class="p-1 rounded hover:bg-[#2A2A2A] text-text-secondary-dark"><span class="material-symbols-outlined text-[20px]">format_italic</span></button>
<button class="p-1 rounded hover:bg-[#2A2A2A] text-text-secondary-dark"><span class="material-symbols-outlined text-[20px]">format_list_bulleted</span></button>
<div class="w-px h-4 bg-border-dark mx-1"></div>
<button class="p-1 rounded hover:bg-[#2A2A2A] text-text-secondary-dark"><span class="material-symbols-outlined text-[20px]">link</span></button>
</div>
<textarea class="w-full bg-transparent border-0 px-4 py-3 text-sm text-text-primary-dark focus:ring-0 resize-y min-h-[120px] outline-none" id="fullDesc" rows="4">The AeroTech Pro features our proprietary moisture-wicking technology and laser-cut ventilation zones...</textarea>
</div>
</div>
<div>
<label class="block text-sm font-medium mb-2 text-text-secondary-dark" for="slug">Slug</label>
<div class="flex gap-2">
<input class="flex-1 bg-[#121212] border border-border-dark rounded-md px-4 py-2.5 text-sm text-text-primary-dark focus:outline-none focus:border-warning focus:ring-1 focus:ring-warning transition-colors" id="slug" type="text" value="aerotech-pro-running-tee"/>
<button class="px-4 py-2.5 border border-border-dark rounded-md text-sm font-medium text-text-primary-dark hover:bg-[#1A1A1A] transition-colors focus:outline-none focus:ring-2 focus:ring-warning">
                                    Auto-generate
                                </button>
</div>
</div>
<div class="flex items-center gap-10 pt-4">
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-[#2A2A2A] peer-checked:bg-primary rounded-full transition-colors"></div>
<div class="absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform peer-checked:translate-x-5"></div>
</div>
<span class="text-sm font-medium text-text-primary-dark">Active</span>
</label>
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative">
<input class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-[#2A2A2A] peer-checked:bg-primary rounded-full transition-colors"></div>
<div class="absolute left-1 top-1 bg-white/60 peer-checked:bg-white w-4 h-4 rounded-full transition-transform peer-checked:translate-x-5"></div>
</div>
<span class="text-sm font-medium text-text-primary-dark">Featured</span>
</label>
</div>
</div>
</div>
</div>
</div>
</div>

</body></html>
