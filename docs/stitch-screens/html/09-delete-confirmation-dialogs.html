<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dark Precision Admin - Delete Confirmation</title>
<!-- BEGIN: External Resources -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              dark: '#0A0A0A',
              sidebar: '#111111',
              card: '#121212',
              muted: '#68869A',
              danger: '#EF4444'
            }
          }
        }
      }
    }
  </script>
<!-- END: External Resources -->
<!-- BEGIN: Custom Styles -->
<style data-purpose="glassmorphism-effects">
    .glass-card {
      background: rgba(18, 18, 18, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    
    .sidebar-border {
      border-right: 1px solid rgba(255, 255, 255, 0.05);
    }

    input:focus {
      outline: none;
      box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
    }
  </style>
<!-- END: Custom Styles -->
</head>
<body class="bg-brand-dark text-white font-sans h-full overflow-hidden">
<div class="flex h-full w-full" data-purpose="app-container">
<!-- BEGIN: Sidebar Context -->
<aside class="w-64 bg-brand-sidebar sidebar-border hidden lg:flex flex-col p-6 space-y-8" data-purpose="sidebar">
<div class="flex items-center space-x-2">
<div class="w-8 h-8 bg-white rounded flex items-center justify-center">
<div class="w-4 h-4 bg-black rounded-sm"></div>
</div>
<span class="font-bold tracking-tight">Precision Admin</span>
</div>
<nav class="space-y-4 opacity-40">
<div class="h-4 w-32 bg-white/20 rounded"></div>
<div class="h-4 w-40 bg-white/20 rounded"></div>
<div class="h-4 w-24 bg-white/20 rounded"></div>
<div class="h-4 w-36 bg-white/20 rounded"></div>
</nav>
</aside>
<!-- END: Sidebar Context -->
<!-- BEGIN: Main Dashboard Area -->
<main class="flex-1 relative flex items-center justify-center p-8 bg-brand-dark overflow-auto">
<!-- Background Content Simulation -->
<div aria-hidden="true" class="absolute inset-0 p-12 opacity-5 pointer-events-none">
<div class="grid grid-cols-3 gap-8">
<div class="h-64 bg-white/10 rounded-lg"></div>
<div class="h-64 bg-white/10 rounded-lg"></div>
<div class="h-64 bg-white/10 rounded-lg"></div>
<div class="h-64 bg-white/10 rounded-lg"></div>
<div class="h-64 bg-white/10 rounded-lg"></div>
<div class="h-64 bg-white/10 rounded-lg"></div>
</div>
</div>
<!-- BEGIN: Dialogs Container -->
<div class="z-10 flex flex-col xl:flex-row gap-12 items-start justify-center max-w-7xl w-full" data-purpose="modal-showcase">
<!-- BEGIN: Soft Delete Dialog (LEFT) -->
<section class="glass-card w-full max-w-[440px] rounded-2xl p-8 flex flex-col items-center text-center" data-purpose="soft-delete-modal">
<!-- Icon Container -->
<div class="w-16 h-16 bg-brand-danger/10 rounded-full flex items-center justify-center mb-6">
<svg class="w-8 h-8 text-brand-danger" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<h2 class="text-xl font-bold mb-3">Delete Product?</h2>
<p class="text-brand-muted mb-8 leading-relaxed">
            This will move the item to the deleted zone where you can restore it later if needed.
          </p>
<!-- Action Buttons -->
<div class="flex flex-col w-full gap-3">
<button class="w-full py-3 px-4 bg-brand-danger hover:bg-red-600 text-white font-semibold rounded-lg transition-colors duration-200" data-purpose="primary-action">
              Delete
            </button>
<button class="w-full py-3 px-4 bg-transparent border border-white/10 hover:bg-white/5 text-white font-semibold rounded-lg transition-all duration-200" data-purpose="cancel-action">
              Cancel
            </button>
</div>
</section>
<!-- END: Soft Delete Dialog -->
<!-- BEGIN: Hard Delete Dialog (RIGHT) -->
<section class="glass-card w-full max-w-[440px] rounded-2xl p-8 flex flex-col items-center" data-purpose="hard-delete-modal">
<!-- Icon Container -->
<div class="w-16 h-16 bg-brand-danger rounded-full flex items-center justify-center mb-6 shadow-lg shadow-brand-danger/20">
<svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<h2 class="text-xl font-bold mb-4 text-center">Permanently Delete?</h2>
<!-- Warning Box -->
<div class="w-full bg-brand-danger/5 border border-brand-danger/20 rounded-lg p-4 mb-6">
<p class="text-brand-danger text-sm font-medium flex items-center justify-center">
<span class="mr-2">⚠️</span> This action is permanent and cannot be undone.
            </p>
</div>
<!-- Confirmation Input -->
<div class="w-full mb-8">
<label class="block text-xs font-medium text-brand-muted mb-2 uppercase tracking-wider" for="confirm-delete">Type DELETE to confirm</label>
<input class="w-full bg-black/40 border border-brand-danger rounded-lg px-4 py-3 text-white placeholder-white/20 focus:ring-1 focus:ring-brand-danger focus:border-brand-danger transition-all duration-200" id="confirm-delete" placeholder="DELETE" type="text"/>
</div>
<!-- Action Buttons -->
<div class="flex flex-col w-full gap-3">
<button class="w-full py-3 px-4 bg-brand-danger/50 text-white/50 font-semibold rounded-lg cursor-not-allowed" data-purpose="permanently-delete-action" disabled="">
              Permanently Delete
            </button>
<button class="w-full py-3 px-4 bg-transparent border border-white/10 hover:bg-white/5 text-white font-semibold rounded-lg transition-all duration-200" data-purpose="cancel-action">
              Cancel
            </button>
</div>
</section>
<!-- END: Hard Delete Dialog -->
</div>
<!-- END: Dialogs Container -->
</main>
<!-- END: Main Dashboard Area -->
</div>
<!-- BEGIN: Logic Scripts -->
<script data-purpose="ui-interactivity">
    // This script demonstrates a simple state management for the disabled button
    const deleteInput = document.getElementById('confirm-delete');
    const deleteBtn = document.querySelector('[data-purpose="permanently-delete-action"]');

    if (deleteInput && deleteBtn) {
      deleteInput.addEventListener('input', (e) => {
        if (e.target.value === 'DELETE') {
          deleteBtn.classList.remove('bg-brand-danger/50', 'text-white/50', 'cursor-not-allowed');
          deleteBtn.classList.add('bg-brand-danger', 'text-white', 'hover:bg-red-600');
          deleteBtn.disabled = false;
        } else {
          deleteBtn.classList.add('bg-brand-danger/50', 'text-white/50', 'cursor-not-allowed');
          deleteBtn.classList.remove('bg-brand-danger', 'text-white', 'hover:bg-red-600');
          deleteBtn.disabled = true;
        }
      });
    }
  </script>
<!-- END: Logic Scripts -->
</body></html>
