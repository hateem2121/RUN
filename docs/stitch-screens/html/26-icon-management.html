<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>

<title>Run Apparel - Icon Selector</title>
<!-- Tailwind CSS CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Font Setup: Inter is standard for high-precision apps -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style data-purpose="global-typography">
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0a0a0a; /* Dark background for presentation */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #ffffff;
    }
    
    /* Custom Scrollbar for the Grid */
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
<style data-purpose="component-styles">
    .glass-input {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .glass-input:focus {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(59, 130, 246, 0.5);
      outline: none;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }
    .icon-tile-selected {
      border: 1px solid #3B82F6;
      background: rgba(59, 130, 246, 0.1);
    }
    .tab-active {
      border-bottom: 2px solid #3B82F6;
      color: #ffffff;
    }
  </style>
</head>
<body>
<!-- BEGIN: IconSelectorComponent -->
<div class="w-[480px] bg-[#121212] border border-white/10 rounded-xl overflow-hidden shadow-2xl backdrop-blur-md flex flex-col" data-purpose="icon-selector-panel" id="icon-selector">

<div class="flex items-center justify-between">
<h2 class="text-[10px] tracking-widest font-bold text-white/50 uppercase">Select Icon</h2>
<!-- BEGIN: PreviewBox -->
<div class="flex items-center gap-3 bg-white/5 rounded-lg p-2 border border-white/5 backdrop-blur-sm" data-purpose="selected-preview">
<div class="w-8 h-8 flex items-center justify-center bg-white/5 rounded border border-white/10">
<!-- Selected Icon Preview (Home as default) -->
<svg class="text-white" fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
</div>
<div class="pr-2">
<p class="text-[11px] font-semibold text-white leading-none">Home</p>
</div>
</div>
<!-- END: PreviewBox -->
</div>
<!-- Search Input -->
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<svg class="h-4 w-4 text-white/40" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</span>
<input class="glass-input block w-full pl-10 pr-3 py-2 text-sm text-white placeholder-white/30 rounded-md transition-all duration-200" placeholder="Search icons..." type="text"/>
</div>
</header>
<!-- END: HeaderSection -->
<!-- BEGIN: TabsNavigation -->
<nav class="flex items-center justify-between px-4 border-b border-white/5">
<div class="flex gap-4">
<button class="text-[11px] font-medium py-3 tab-active">Tabler Icons</button>
<button class="text-[11px] font-medium py-3 text-white/40 hover:text-white/70 transition-colors">Lucide Icons</button>
</div>
<button class="text-[11px] font-medium py-3 text-white/40 hover:text-white/70 transition-colors">Custom Media Icon</button>
</nav>
<!-- END: TabsNavigation -->
<!-- BEGIN: MainIconGrid -->
