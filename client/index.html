<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RUN APPAREL (PVT) LTD - B2B Sportswear Manufacturing</title>
    <meta
      name="description"
      content="Professional B2B sportswear manufacturing with 3D visualization, premium athletic wear, and sustainable practices for global sports brands."
    />

    <!-- MODEL-VIEWER: Using local package only to avoid conflicts -->
    <!-- REMOVED CDN loading to prevent duplicate registration with @google/model-viewer package -->

    <!-- Optimized Font Loading (REV-006) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="preload" href="/fonts/NeueStance-Regular.ttf" as="font" crossorigin />

    <!-- Critical inline CSS to prevent broken appearance during CSS loading -->
    <style>
      /* Critical base styles loaded immediately to prevent broken appearance */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
        line-height: 1.6;
      }

      /* Loading skeleton animation */
      .loading-skeleton {
        background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        border-radius: 8px;
      }

      @keyframes shimmer {
        0% {
          background-position: -200% 0;
        }
        100% {
          background-position: 200% 0;
        }
      }

      /* Critical layout stability */
      #root {
        min-height: 100vh;
      }

      /* Prevent broken media flashing */
      img {
        max-width: 100%;
        height: auto;
      }

      /* Basic responsive grid */
      .grid {
        display: grid;
        gap: 1rem;
      }
      .flex {
        display: flex;
      }

      /* Hide content until CSS loads to prevent FOUC */
      .main-content {
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .css-loaded .main-content {
        opacity: 1;
      }

      /* Static Noise Overlay - Performance Optimized */
      .noise-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9900; /* Lower than Cursor (10000) and Nav (10001) */
        opacity: 0.05;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        background-repeat: repeat;
        mix-blend-mode: overlay;
      }
    </style>
  </head>
  <body suppressHydrationWarning>
    <div id="root"></div>
    <script type="module" src="/src/entry-client.tsx"></script>
  </body>
</html>
