global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default-receiver"

receivers:
  - name: "default-receiver"
    # Webhook or Slack can be configured here via environment variables in docker-compose
    # webhook_configs:
    #   - url: 'http://example.com/webhook'
