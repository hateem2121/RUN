apiVersion: apps/v1
kind: Deployment
metadata:
  name: run-remix
  labels:
    app: run-remix
    version: v3.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: run-remix
  template:
    metadata:
      labels:
        app: run-remix
        version: v3.0.0
    spec:
      containers:
        - name: run-remix
          image: run-remix:latest
          ports:
            - containerPort: 5002
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5002"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5002
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health/detailed
              port: 5002
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: run-remix
  labels:
    app: run-remix
spec:
  selector:
    app: run-remix
  ports:
    - port: 5002
      targetPort: 5002
  type: ClusterIP